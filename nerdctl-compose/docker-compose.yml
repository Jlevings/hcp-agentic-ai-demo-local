# =============================================================================
# docker-compose.yml — Full Demo Stack
# =============================================================================
# This is the top-level compose file for the Vault Agentic IAM local demo.
# It runs all five services on a shared Docker network so they can communicate
# by service name (e.g., products-mcp can resolve "products-agent").
#
# Services:
#   vault       — Vault Enterprise (secrets management)
#   mongodb     — MongoDB (application database)
#   products-mcp   — MCP server (calls Vault, executes DB operations)
#   products-agent — Agent API (OBO token exchange, calls Bedrock/Anthropic)
#   products-web   — Streamlit UI (Entra ID login, chat interface)
#
# Compatible with:
#   nerdctl compose (Rancher Desktop)
#   docker compose (Docker Desktop — fallback)
#
# Usage:
#   nerdctl compose up -d
#   nerdctl compose down
#   nerdctl compose logs -f
# =============================================================================

name: confused-demo

# ── Network ──────────────────────────────────────────────────────────────────
# A dedicated bridge network allows containers to communicate by service name
# and isolates the demo from other local containers.
networks:
  demo-net:
    driver: bridge
    # host.docker.internal is available on this network for containers to
    # reach services running on the host (Vault and MongoDB on first run).

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── vault-enterprise ─────────────────────────────────────────────────────────
  # Vault Enterprise — secrets management, JWT auth, dynamic MongoDB credentials.
  # Runs on the shared demo-net so app containers can reach it by service name
  # (vault-enterprise:8200) without relying on host.docker.internal.
  # Data is persisted to ~/.demo/vault/data on the host across restarts.
  # NOTE: Vault must be unsealed after every container restart. Run:
  #   ansible-playbook ansible/playbooks/02-vault.yml
  vault-enterprise:
    image: hashicorp/vault-enterprise:latest
    container_name: vault-enterprise
    # Explicitly start Vault server with the HCL config file.
    # Without this, the image entrypoint defaults to dev/inmem mode which is
    # unsupported for Vault Enterprise and discards all data on restart.
    command: vault server -config=/vault/config/vault.hcl
    ports:
      - "8200:8200"    # Vault API + UI
    volumes:
      - /Users/joelevingston/.demo/vault/data:/vault/data
      - /Users/joelevingston/.demo/vault/config:/vault/config
    environment:
      - VAULT_LICENSE_PATH=/vault/config/vault.hclic
      - VAULT_ADDR=http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK    # Required by Vault to prevent secrets from being swapped to disk
    networks:
      - demo-net
    restart: unless-stopped

  # ── mongodb ───────────────────────────────────────────────────────────────────
  # MongoDB 7.0 — application database for the products collection.
  # Data is persisted to ~/.demo/mongodb/data on the host across restarts.
  # Vault connects here as admin to create/revoke ephemeral users.
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"    # MongoDB wire protocol
    volumes:
      - /Users/joelevingston/.demo/mongodb/data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongoadmin
      - MONGO_INITDB_ROOT_PASSWORD=DgzjlQzrkJ1QZuQhL5nWujEu9ISb4cv8
    networks:
      - demo-net
    restart: unless-stopped

  # ── products-mcp ────────────────────────────────────────────────────────────
  # The Model Context Protocol server. Validates OBO tokens via Vault's JWT
  # auth, fetches short-lived MongoDB credentials, and executes DB operations.
  # This is the security enforcement point — it never holds long-lived secrets.
  products-mcp:
    image: drum0r/products-mcp:${tag:-latest}
    platform: ${platform:-linux/amd64}
    container_name: products-mcp
    ports:
      - "8000:8000"    # MCP server HTTP endpoint
    volumes:
      # Mount the .env file generated by Ansible (04-app-stack.yml).
      # Contains: DB connection, Vault address/namespace, JWT config.
      - ./products-mcp/.env:/app/.env:ro
    networks:
      - demo-net
    extra_hosts:
      # Allows the container to reach the host machine's services.
      # Points to the host IP so containers can call:
      #   Vault:   http://host.docker.internal:8200
      #   MongoDB: host.docker.internal:27017 (if MongoDB runs on host)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── products-agent ──────────────────────────────────────────────────────────
  # The AI agent backend API. Receives requests from the web UI (with user JWT),
  # performs the Entra ID OBO token exchange, and orchestrates the MCP server
  # to execute database operations. Calls AWS Bedrock or Anthropic for AI.
  products-agent:
    # Build the local Anthropic-enabled wrapper instead of pulling upstream.
    # The Dockerfile in products-agent/ installs the anthropic package and
    # patches models.py to route to Anthropic API when ANTHROPIC_API_KEY is set.
    build:
      context: ./products-agent
      dockerfile: Dockerfile
    image: products-agent-local:latest
    platform: ${platform:-linux/arm64}
    container_name: products-agent
    ports:
      - "8001:8001"    # Agent API HTTP endpoint
    volumes:
      # Contains: JWT config, Entra ID OBO credentials, ANTHROPIC_API_KEY.
      - ./products-agent/.env:/app/.env:ro
    networks:
      - demo-net
    depends_on:
      products-mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── products-web ─────────────────────────────────────────────────────────────
  # The Streamlit web frontend. Handles Entra ID OIDC login, displays the
  # chat interface, and forwards user requests (with JWT) to the agent API.
  products-web:
    image: drum0r/products-web:${tag:-latest}
    platform: ${platform:-linux/amd64}
    container_name: products-web
    ports:
      - "8501:8501"    # Streamlit HTTP endpoint (open in browser)
    volumes:
      # Contains: Entra ID OIDC credentials, redirect URI, agent URL.
      - ./products-web/.env:/app/.env:ro
    networks:
      - demo-net
    depends_on:
      products-agent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
