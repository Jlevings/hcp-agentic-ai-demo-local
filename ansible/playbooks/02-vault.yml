---
# =============================================================================
# 02-vault.yml — Start and Initialize Vault Enterprise
# =============================================================================
# Orchestrates the vault role to start, initialize, and unseal a local
# Vault Enterprise instance running in a nerdctl container.
#
# Usage:
#   ansible-playbook ansible/playbooks/02-vault.yml
#
# After this playbook completes:
#   - Vault is running at http://localhost:8200
#   - Init data is at ~/.demo/vault/init.json
#   - Root token is at ~/.demo/vault/.vault-token
#   - Vault UI is accessible at http://localhost:8200/ui
# =============================================================================

- name: Start and initialize Vault Enterprise
  hosts: localhost
  connection: local
  gather_facts: true

  roles:
    - role: vault
