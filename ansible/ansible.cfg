# =============================================================================
# ansible.cfg — Ansible Configuration
# =============================================================================
# Local Ansible configuration for the Vault Agentic IAM demo.
# This config targets localhost only — no remote SSH connections required.
# =============================================================================

[defaults]
# Default inventory file path
inventory = ./inventory/localhost.yml

# Roles directory
roles_path = ./roles

# Suppress deprecation warnings for cleaner output during demo
deprecation_warnings = False

# Retry files cause noise in the working directory — disable them
retry_files_enabled = False

# Display output using the built-in default callback with yaml result format
# (community.general.yaml callback was removed in community.general v12)
stdout_callback = ansible.builtin.default
result_format = yaml

# Show task timing — using built-in callbacks only (community.general timer/profile_tasks removed in v12)
callbacks_enabled = ansible.builtin.timer, ansible.builtin.profile_tasks

# Skip SSH host key checking for localhost (no SSH used)
host_key_checking = False

[connection]
# Default to local connection — no SSH needed for localhost playbooks
pipelining = True
